<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan - 数据统计</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: '#FF6B35', 'dark': '#2D2D2D', 'bg-gray': '#F5F5F5',
        'text-gray': '#999999', 'text-light': '#BBBBBB', 'border': '#EEEEEE',
        'success': '#2ED573', 'warning': '#FFA502',
      }
    }
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif; background: #E8E8E8; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .phone-frame { width: 430px; height: 932px; background: #F5F5F5; overflow-y: auto; overflow-x: hidden; position: relative; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .phone-frame::-webkit-scrollbar { width: 0; }
  .bar { width: 20px; border-radius: 4px 4px 0 0; transition: height 0.5s; }
  .muscle-dot { width: 8px; height: 8px; border-radius: 50%; }
</style>
</head>
<body>
<div class="phone-frame">
  <!-- Header -->
  <div class="sticky top-0 z-30 bg-white px-5 pt-14 pb-4 border-b border-border">
    <div class="flex items-center gap-3">
      <div class="cursor-pointer p-1" onclick="history.back()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="text-lg font-semibold text-dark">训练周报</span>
      <span class="text-xs text-text-gray ml-auto">6/1 - 6/7</span>
    </div>
  </div>

  <!-- Week Summary Cards -->
  <div class="px-4 mt-5">
    <div class="grid grid-cols-3 gap-2">
      <div class="bg-white rounded-2xl p-3 text-center shadow-sm">
        <div class="text-2xl font-bold text-dark">5</div>
        <div class="text-[10px] text-text-gray">本周训练天数</div>
      </div>
      <div class="bg-white rounded-2xl p-3 text-center shadow-sm">
        <div class="text-2xl font-bold text-primary">3.5<span class="text-xs">h</span></div>
        <div class="text-[10px] text-text-gray">本周训练时长</div>
      </div>
      <div class="bg-white rounded-2xl p-3 text-center shadow-sm">
        <div class="text-2xl font-bold text-success">12,500<span class="text-xs">kg</span></div>
        <div class="text-[10px] text-text-gray">总训练容量</div>
      </div>
    </div>
  </div>

  <!-- Volume Trend Chart (Bar Chart) -->
  <div class="px-4 mt-4">
    <div class="bg-white rounded-2xl p-4 shadow-sm">
      <div class="text-sm font-semibold text-dark mb-4">📊 训练容量趋势</div>
      <div class="flex items-end justify-around h-36 mb-2">
        <div class="flex flex-col items-center gap-1">
          <span class="text-[10px] font-semibold text-dark">2,100</span>
          <div class="bar bg-primary/30" style="height:80px"></div>
          <span class="text-[10px] text-text-gray">一</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <span class="text-[10px] font-semibold text-dark">1,800</span>
          <div class="bar bg-primary/40" style="height:70px"></div>
          <span class="text-[10px] text-text-gray">二</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <span class="text-[10px] font-semibold text-dark">2,500</span>
          <div class="bar bg-primary" style="height:98px"></div>
          <span class="text-[10px] text-text-gray">三</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <span class="text-[10px] font-semibold text-dark">—</span>
          <div class="bar bg-gray-200" style="height:20px"></div>
          <span class="text-[10px] text-text-gray">四</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <span class="text-[10px] font-semibold text-dark">2,200</span>
          <div class="bar bg-primary/60" style="height:86px"></div>
          <span class="text-[10px] text-text-gray">五</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <span class="text-[10px] font-semibold text-dark">2,800</span>
          <div class="bar bg-primary" style="height:108px"></div>
          <span class="text-[10px] text-text-gray">六</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <span class="text-[10px] font-semibold text-primary">3,100</span>
          <div class="bar bg-primary" style="height:120px"></div>
          <span class="text-[10px] text-text-gray">日</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Muscle Group Distribution -->
  <div class="px-4 mt-4">
    <div class="bg-white rounded-2xl p-4 shadow-sm">
      <div class="text-sm font-semibold text-dark mb-4">💪 肌群训练分布</div>
      <div class="space-y-3">
        <div>
          <div class="flex justify-between text-xs mb-1"><span>胸部</span><span class="text-text-gray">28%</span></div>
          <div class="h-2 bg-bg-gray rounded-full overflow-hidden"><div class="h-full bg-primary rounded-full" style="width:28%"></div></div>
        </div>
        <div>
          <div class="flex justify-between text-xs mb-1"><span>背部</span><span class="text-text-gray">22%</span></div>
          <div class="h-2 bg-bg-gray rounded-full overflow-hidden"><div class="h-full bg-blue-500 rounded-full" style="width:22%"></div></div>
        </div>
        <div>
          <div class="flex justify-between text-xs mb-1"><span>腿部</span><span class="text-text-gray">18%</span></div>
          <div class="h-2 bg-bg-gray rounded-full overflow-hidden"><div class="h-full bg-success rounded-full" style="width:18%"></div></div>
        </div>
        <div>
          <div class="flex justify-between text-xs mb-1"><span>肩部</span><span class="text-text-gray">15%</span></div>
          <div class="h-2 bg-bg-gray rounded-full overflow-hidden"><div class="h-full bg-warning rounded-full" style="width:15%"></div></div>
        </div>
        <div>
          <div class="flex justify-between text-xs mb-1"><span>手臂</span><span class="text-text-gray">10%</span></div>
          <div class="h-2 bg-bg-gray rounded-full overflow-hidden"><div class="h-full bg-purple-500 rounded-full" style="width:10%"></div></div>
        </div>
        <div>
          <div class="flex justify-between text-xs mb-1"><span>核心</span><span class="text-text-gray">7%</span></div>
          <div class="h-2 bg-bg-gray rounded-full overflow-hidden"><div class="h-full bg-pink-500 rounded-full" style="width:7%"></div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Calorie Comparison -->
  <div class="px-4 mt-4 pb-8">
    <div class="bg-white rounded-2xl p-4 shadow-sm">
      <div class="text-sm font-semibold text-dark mb-4">⚡ 热量摄入 vs 消耗</div>
      <div class="flex items-end justify-around h-32 mb-3">
        <div class="flex flex-col items-center gap-1">
          <span class="text-[10px] text-text-gray">一</span>
          <div class="flex gap-1 items-end">
            <div class="w-7 bg-success/70 rounded-t" style="height:60px"></div>
            <div class="w-7 bg-primary/60 rounded-t" style="height:80px"></div>
          </div>
          <span class="text-[9px] text-text-gray">摄入/消耗</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <span class="text-[10px] text-text-gray">二</span>
          <div class="flex gap-1 items-end">
            <div class="w-7 bg-success/70 rounded-t" style="height:65px"></div>
            <div class="w-7 bg-primary/60 rounded-t" style="height:72px"></div>
          </div>
        </div>
        <div class="flex flex-col items-center gap-1">
          <span class="text-[10px] text-text-gray">三</span>
          <div class="flex gap-1 items-end">
            <div class="w-7 bg-success/70 rounded-t" style="height:55px"></div>
            <div class="w-7 bg-primary/60 rounded-t" style="height:90px"></div>
          </div>
        </div>
        <div class="flex flex-col items-center gap-1">
          <span class="text-[10px] text-text-gray">四</span>
          <div class="flex gap-1 items-end">
            <div class="w-7 bg-success/70 rounded-t" style="height:58px"></div>
            <div class="w-7 bg-gray-300 rounded-t" style="height:10px"></div>
          </div>
        </div>
        <div class="flex flex-col items-center gap-1">
          <span class="text-[10px] text-text-gray">五</span>
          <div class="flex gap-1 items-end">
            <div class="w-7 bg-success/70 rounded-t" style="height:62px"></div>
            <div class="w-7 bg-primary/60 rounded-t" style="height:78px"></div>
          </div>
        </div>
        <div class="flex flex-col items-center gap-1">
          <span class="text-[10px] text-text-gray">六</span>
          <div class="flex gap-1 items-end">
            <div class="w-7 bg-success/70 rounded-t" style="height:70px"></div>
            <div class="w-7 bg-primary/60 rounded-t" style="height:85px"></div>
          </div>
        </div>
        <div class="flex flex-col items-center gap-1">
          <span class="text-[10px] text-text-gray">日</span>
          <div class="flex gap-1 items-end">
            <div class="w-7 bg-success/70 rounded-t" style="height:64px"></div>
            <div class="w-7 bg-primary/60 rounded-t" style="height:82px"></div>
          </div>
        </div>
      </div>
      <div class="flex justify-center gap-6 text-[10px] text-text-gray">
        <div class="flex items-center gap-1"><div class="w-3 h-3 bg-success/70 rounded"></div>摄入</div>
        <div class="flex items-center gap-1"><div class="w-3 h-3 bg-primary/60 rounded"></div>消耗</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
