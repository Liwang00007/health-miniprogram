<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan - 登录</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: '#FF6B35',
        'primary-light': '#FF8F5E',
        'primary-dark': '#E55A2B',
        dark: '#2D2D2D',
        'bg-gray': '#F5F5F5',
        'text-gray': '#999999',
        'text-light': '#BBBBBB',
      }
    }
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif; background: #E8E8E8; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .phone-frame { width: 430px; height: 932px; background: #fff; overflow-y: auto; overflow-x: hidden; position: relative; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .phone-frame::-webkit-scrollbar { width: 0; }
  .wechat-btn { background: #07C160; color: #fff; border: none; border-radius: 26px; padding: 14px 48px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; transition: transform 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .wechat-btn:active { transform: scale(0.97); background: #06AD56; }
  .feature-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; }
  .feature-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
</style>
</head>
<body>
<div class="phone-frame flex flex-col">
  <!-- Top Section -->
  <div class="flex-1 flex flex-col items-center justify-center px-8 pt-16">
    <!-- Logo -->
    <div class="w-24 h-24 rounded-3xl bg-gradient-to-br from-primary to-primary-light flex items-center justify-center mb-6 shadow-lg shadow-primary/30">
      <span class="text-5xl">💪</span>
    </div>
    <h1 class="text-2xl font-bold text-dark mb-2">FitPlan 健身助手</h1>
    <p class="text-sm text-text-gray text-center mb-10">智能训练与饮食管理，让每一次健身都看得见</p>

    <!-- Features -->
    <div class="w-full space-y-1 mb-10">
      <div class="feature-item">
        <div class="feature-icon bg-orange-50">📊</div>
        <div>
          <div class="text-sm font-semibold text-dark">科学记录</div>
          <div class="text-xs text-text-gray">训练数据与饮食营养一键记录</div>
        </div>
      </div>
      <div class="feature-item">
        <div class="feature-icon bg-blue-50">🤖</div>
        <div>
          <div class="text-sm font-semibold text-dark">AI 定制计划</div>
          <div class="text-xs text-text-gray">个性化训练与饮食方案智能生成</div>
        </div>
      </div>
      <div class="feature-item">
        <div class="feature-icon bg-green-50">📈</div>
        <div>
          <div class="text-sm font-semibold text-dark">数据可视化</div>
          <div class="text-xs text-text-gray">训练周报与成长趋势一目了然</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Section -->
  <div class="px-8 pb-12">
    <button class="wechat-btn mb-4" onclick="location.href='mine.html'">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348zM5.785 5.991c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178A1.17 1.17 0 0 1 4.623 7.17c0-.651.52-1.18 1.162-1.18zm5.813 0c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178 1.17 1.17 0 0 1-1.162-1.178c0-.651.52-1.18 1.162-1.18zm5.34 2.867c-1.797-.052-3.746.512-5.28 1.786-1.72 1.428-2.687 3.72-1.78 6.22.741 2.039 2.64 3.204 4.734 3.204.54 0 1.09-.078 1.613-.24l1.324.78a.297.297 0 0 0 .16.054c.162 0 .293-.131.293-.295 0-.072-.03-.142-.048-.213l-.27-1.032c1.495-1.022 2.419-2.646 2.419-4.518-.004-3.124-2.962-5.683-6.165-5.746zm-2.994 2.26c.552 0 1 .456 1 1.016 0 .56-.448 1.015-1 1.015s-1-.455-1-1.015c0-.56.448-1.016 1-1.016zm4.917 0c.552 0 1 .456 1 1.016 0 .56-.448 1.015-1 1.015s-1-.455-1-1.015c0-.56.448-1.016 1-1.016z"/></svg>
      微信一键登录
    </button>
    <div class="flex items-center gap-2 justify-center mb-6">
      <input type="checkbox" id="agree" checked class="w-4 h-4 accent-primary">
      <label for="agree" class="text-xs text-text-gray">已阅读并同意 <span class="text-primary cursor-pointer" onclick="alert('隐私政策内容')">《隐私政策》</span> 和 <span class="text-primary cursor-pointer" onclick="alert('用户协议内容')">《用户协议》</span></label>
    </div>
    <p class="text-[11px] text-text-light text-center">注册即送 <span class="text-primary font-semibold">10 积分</span>，开启智能健身之旅</p>
  </div>
</div>
</body>
</html>
