<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan - 训练详情</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: '#FF6B35', 'dark': '#2D2D2D', 'bg-gray': '#F5F5F5',
        'text-gray': '#999999', 'text-light': '#BBBBBB', 'border': '#EEEEEE',
      }
    }
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif; background: #E8E8E8; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .phone-frame { width: 430px; height: 932px; background: #F5F5F5; overflow-y: auto; overflow-x: hidden; position: relative; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .phone-frame::-webkit-scrollbar { width: 0; }
  .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f5f5f5; font-size: 14px; }
  .info-row:last-child { border-bottom: none; }
</style>
</head>
<body>
<div class="phone-frame">
  <!-- Header -->
  <div class="sticky top-0 z-30 bg-white px-5 pt-14 pb-4 border-b border-border flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="cursor-pointer p-1" onclick="history.back()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="text-lg font-semibold text-dark">训练详情</span>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-sm text-primary cursor-pointer font-medium" onclick="alert('进入编辑模式')">编辑</span>
      <span class="text-sm text-red-500 cursor-pointer" onclick="if(confirm('确定删除此训练记录？')){history.back()}">删除</span>
    </div>
  </div>

  <div class="px-4 pt-4 pb-8">
    <!-- Exercise Header -->
    <div class="bg-white rounded-2xl p-4 shadow-sm mb-4">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-12 h-12 rounded-full bg-orange-50 flex items-center justify-center text-2xl">🏋️</div>
        <div>
          <div class="text-base font-bold text-dark">杠铃卧推</div>
          <div class="text-xs text-text-gray">力量训练 · 2026-06-06 10:30</div>
        </div>
      </div>
      <div class="grid grid-cols-3 gap-2">
        <div class="bg-bg-gray rounded-xl p-2.5 text-center">
          <div class="text-lg font-bold text-dark">4</div>
          <div class="text-[10px] text-text-gray">组数</div>
        </div>
        <div class="bg-bg-gray rounded-xl p-2.5 text-center">
          <div class="text-lg font-bold text-primary">30<span class="text-xs">min</span></div>
          <div class="text-[10px] text-text-gray">时长</div>
        </div>
        <div class="bg-bg-gray rounded-xl p-2.5 text-center">
          <div class="text-lg font-bold text-dark">2,520<span class="text-xs">kg</span></div>
          <div class="text-[10px] text-text-gray">总容量</div>
        </div>
      </div>
    </div>

    <!-- Set Details -->
    <div class="bg-white rounded-2xl shadow-sm mb-4">
      <div class="p-4 pb-2 text-sm font-semibold text-dark">📋 每组记录</div>
      <div class="px-4 pb-4">
        <div class="flex text-[10px] text-text-gray pb-1 border-b border-border mb-1">
          <span class="w-12">组数</span><span class="w-20 text-right">重量(kg)</span><span class="w-16 text-right">次数</span><span class="flex-1 text-right">休息(s)</span>
        </div>
        <div class="info-row"><span class="text-dark w-12">第1组</span><span class="w-20 text-right">60</span><span class="w-16 text-right">12</span><span class="flex-1 text-right text-text-gray">60</span></div>
        <div class="info-row"><span class="text-dark w-12">第2组</span><span class="w-20 text-right">65</span><span class="w-16 text-right">10</span><span class="flex-1 text-right text-text-gray">60</span></div>
        <div class="info-row"><span class="text-dark w-12">第3组</span><span class="w-20 text-right">70</span><span class="w-16 text-right">8</span><span class="flex-1 text-right text-text-gray">90</span></div>
        <div class="info-row"><span class="text-dark w-12">第4组</span><span class="w-20 text-right">65</span><span class="w-16 text-right">10</span><span class="flex-1 text-right text-text-gray">60</span></div>
      </div>
    </div>

    <!-- Notes -->
    <div class="bg-white rounded-2xl p-4 shadow-sm mb-4">
      <div class="text-sm font-semibold text-dark mb-1">📝 备注</div>
      <div class="text-sm text-text-gray">今天状态不错，最后一组略吃力。下次可以尝试加到75kg。</div>
    </div>

    <!-- Volume Trend -->
    <div class="bg-white rounded-2xl p-4 shadow-sm">
      <div class="text-sm font-semibold text-dark mb-3">📈 该动作近期趋势</div>
      <div class="flex items-end justify-around h-24">
        <div class="flex flex-col items-center"><div class="w-8 bg-primary/30 rounded-t" style="height:50px"></div><span class="text-[9px] text-text-gray mt-1">5/30</span></div>
        <div class="flex flex-col items-center"><div class="w-8 bg-primary/40 rounded-t" style="height:60px"></div><span class="text-[9px] text-text-gray mt-1">6/1</span></div>
        <div class="flex flex-col items-center"><div class="w-8 bg-primary/60 rounded-t" style="height:70px"></div><span class="text-[9px] text-text-gray mt-1">6/3</span></div>
        <div class="flex flex-col items-center"><div class="w-8 bg-primary rounded-t" style="height:85px"></div><span class="text-[9px] text-primary mt-1">6/6</span></div>
      </div>
      <div class="text-center text-[10px] text-success mt-2">↑ 容量比上次提升 21%</div>
    </div>
  </div>
</div>
</body>
</html>
