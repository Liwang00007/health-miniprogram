<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan - 饮食详情</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: '#FF6B35', 'dark': '#2D2D2D', 'bg-gray': '#F5F5F5',
        'text-gray': '#999999', 'text-light': '#BBBBBB', 'border': '#EEEEEE',
        'success': '#2ED573',
      }
    }
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif; background: #E8E8E8; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .phone-frame { width: 430px; height: 932px; background: #F5F5F5; overflow-y: auto; overflow-x: hidden; position: relative; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .phone-frame::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>
<div class="phone-frame">
  <!-- Header -->
  <div class="sticky top-0 z-30 bg-white px-5 pt-14 pb-4 border-b border-border flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="cursor-pointer p-1" onclick="history.back()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="text-lg font-semibold text-dark">饮食详情</span>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-sm text-primary cursor-pointer font-medium" onclick="alert('进入编辑模式')">编辑</span>
      <span class="text-sm text-red-500 cursor-pointer" onclick="if(confirm('确定删除此饮食记录？')){history.back()}">删除</span>
    </div>
  </div>

  <div class="px-4 pt-4 pb-8">
    <!-- Food Header -->
    <div class="bg-white rounded-2xl p-4 shadow-sm mb-4">
      <div class="flex items-center gap-3 mb-3">
        <span class="text-4xl">🐔</span>
        <div>
          <div class="text-base font-bold text-dark">鸡胸肉</div>
          <div class="text-xs text-text-gray">
            <span class="bg-green-100 text-green-700 px-1.5 py-0.5 rounded text-[10px]">午餐</span>
            2026-06-06 12:15
          </div>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-2">
        <div class="bg-bg-gray rounded-xl p-2.5 text-center">
          <div class="text-lg font-bold text-primary">248</div>
          <div class="text-[10px] text-text-gray">热量 (kcal)</div>
        </div>
        <div class="bg-bg-gray rounded-xl p-2.5 text-center">
          <div class="text-lg font-bold text-dark">150</div>
          <div class="text-[10px] text-text-gray">分量 (g)</div>
        </div>
      </div>
    </div>

    <!-- Nutrition Breakdown -->
    <div class="bg-white rounded-2xl p-4 shadow-sm mb-4">
      <div class="text-sm font-semibold text-dark mb-4">🔬 营养素分布</div>
      <!-- Macro Pie Visualization (bar style) -->
      <div class="space-y-3">
        <div>
          <div class="flex justify-between text-xs mb-1">
            <span>蛋白质 46.5g</span>
            <span class="text-text-gray">65%</span>
          </div>
          <div class="h-2 bg-bg-gray rounded-full overflow-hidden">
            <div class="h-full bg-blue-500 rounded-full" style="width:65%"></div>
          </div>
        </div>
        <div>
          <div class="flex justify-between text-xs mb-1">
            <span>脂肪 5.3g</span>
            <span class="text-text-gray">19%</span>
          </div>
          <div class="h-2 bg-bg-gray rounded-full overflow-hidden">
            <div class="h-full bg-yellow-500 rounded-full" style="width:19%"></div>
          </div>
        </div>
        <div>
          <div class="flex justify-between text-xs mb-1">
            <span>碳水 0g</span>
            <span class="text-text-gray">0%</span>
          </div>
          <div class="h-2 bg-bg-gray rounded-full overflow-hidden">
            <div class="h-full bg-green-500 rounded-full" style="width:0%"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Daily Context -->
    <div class="bg-white rounded-2xl p-4 shadow-sm mb-4">
      <div class="text-sm font-semibold text-dark mb-3">📊 今日摄入进度</div>
      <div class="flex items-center gap-3 mb-2">
        <div class="flex-1">
          <div class="flex justify-between text-xs mb-1"><span>已摄入</span><span class="text-primary font-semibold">1,850 / 2,800 kcal</span></div>
          <div class="h-2 bg-bg-gray rounded-full overflow-hidden">
            <div class="h-full bg-primary rounded-full" style="width:66%"></div>
          </div>
        </div>
      </div>
      <div class="text-[10px] text-text-gray">此餐占今日总摄入的 13.4%</div>
    </div>

    <!-- Notes -->
    <div class="bg-white rounded-2xl p-4 shadow-sm">
      <div class="text-sm font-semibold text-dark mb-1">📝 备注</div>
      <div class="text-sm text-text-gray">无</div>
    </div>
  </div>
</div>
</body>
</html>
